name: SEO health check

on:
  schedule:
    # Mondays 13:00 UTC (7-8am Central)
    - cron: "0 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seo-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SEO health checks against the live site
        # `shell: bash` is load-bearing: it runs with -o pipefail so the script's
        # non-zero exit survives the pipe to tee. Under the default shell the
        # step's status came from tee (always 0) and `if: failure()` never fired,
        # so a failing check could never open an issue.
        shell: bash
        # 2>&1 so an unexpected traceback lands in the report too; without it a
        # crash would produce an issue body containing an empty code block.
        run: python3 scripts/seo_health_check.py 2>&1 | tee /tmp/seo-health.txt

      - name: Report failure
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          report=$(printf 'The weekly live-site SEO check found regressions:\n\n```\n%s\n```\n\nChecks live in scripts/seo_health_check.py (workflow: .github/workflows/seo-health.yml). Recent deploys or redesign merges are the usual cause - verify indexability/title/schema/NAP survived.' "$(cat /tmp/seo-health.txt)")
          open_num=$(gh issue list --state open --search '"SEO health check failed" in:title' --json number --jq '.[0].number // empty')
          if [ -n "$open_num" ]; then
            # Comment rather than skip: an issue left open from a previous run
            # must not silence a later, different regression.
            gh issue comment "$open_num" --body "$report"
          else
            gh issue create --title "SEO health check failed $(date -u +%F)" --body "$report"
          fi
